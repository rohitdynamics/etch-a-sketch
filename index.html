<!DOCTYPE html>
<html>
    <head>
    <title>Let's DRAW !</title>
    <link rel="stylesheet" href="eas.css">
    <script src="eas.js" defer></script>
    </head>
    <body>
        <header>ETCH__A__SKETCH</header>
        <div id="midsection">
            <div id="leftmidsection"></div>
            <div id="sketch">
                <div id="artboard"></div>
                <div id="buttons">
                    <form>
                        <label for="gridsize"></label>
                        <input type="text" name="gridsize" id="gridsize" placeholder="Enter grid size">
                    </form>
                    <button id="rgbbtn">RGB</button>
                    <button id="blackbtn">BLACK</button>
                    <button id="shadebtn">SHADE</button>
                    <button id="startbtn">START</button>
                    <button id="resetbtn">RESET</button>
                </div>
            </div>
            <div id="rightmidsection"></div>
        </div>    
        <footer>UNLEASH__YOUR__CREATIVITY</footer>
    </body>
</html>
